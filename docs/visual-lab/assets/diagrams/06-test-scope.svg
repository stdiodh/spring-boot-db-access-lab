<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="seq06-title seq06-desc">
  <title id="seq06-title">06 단위 테스트 범위 지도</title>
  <desc id="seq06-desc">시스템 밖 Fixture가 서비스·정책 Service를 실행하고 상태·데이터 Repository mock과 상호작용한 결과를 시스템 밖 Assertion이 확인하며 HTTP 입구·출구는 별도 검증으로 남는 지도</desc>
