<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="seq05-reset-title seq05-reset-desc">
  <title id="seq05-reset-title">05 비밀번호 재설정 token 수명 주기</title>
  <desc id="seq05-reset-desc">raw token 발급과 SHA-256 hash 저장, commit 이후 동기 SMTP의 200 또는 424 결과, confirm의 hash 조회와 잠금 뒤 BCrypt password와 usedAt을 같은 transaction에서 기록하는 세 단계. 200은 받은 편지함 도착이 아니라 SMTP 요청 수락을 뜻한다.</desc>
  <metadata>Source: A&amp;I Backend Visual Lab; License: project-local educational asset; redistribution follows repository terms.</metadata>
  <defs>
    <marker id="reset-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#2955E4"/>
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#111B3F;text-anchor:middle}
      .frame{fill:#FFFFFF;stroke:#6F82B8;stroke-width:2}
      .outside{fill:#F1F5F9;stroke:#5B677A;stroke-width:2.5}
      .application{fill:#F2EDFF;stroke:#6D43A8;stroke-width:2.5}
      .resource{fill:#EAF5EE;stroke:#2C7352;stroke-width:2.5}
      .integration{fill:#FFF4D6;stroke:#926000;stroke-width:2.5}
      .flow{fill:none;stroke:#2955E4;stroke-width:3;stroke-linecap:round;marker-end:url(#reset-arrow)}
      .lane{font-size:25px;font-weight:850;fill:#0C2691;text-anchor:start}
      .name{font-size:27px;font-weight:850}
      .detail{font-size:25px;font-weight:650;fill:#4B587C}
    </style>
  </defs>

  <rect width="720" height="360" fill="#F8F9FB"/>
  <rect x="16" y="12" width="688" height="336" rx="18" class="frame"/>

  <text x="34" y="40" class="lane">발급</text>
  <rect x="34" y="50" width="178" height="66" rx="11" class="outside"/>
  <text x="123" y="78" class="name">32-byte raw</text>
  <text x="123" y="104" class="detail">Base64URL</text>
  <path d="M212 83h42" class="flow"/>
  <rect x="258" y="50" width="178" height="66" rx="11" class="application"/>
  <text x="347" y="78" class="name">SHA-256</text>
  <text x="347" y="104" class="detail">raw / hash 분리</text>
  <path d="M436 83h42" class="flow"/>
  <rect x="482" y="50" width="204" height="66" rx="11" class="resource"/>
  <text x="584" y="78" class="name">DB hash row</text>
  <text x="584" y="104" class="detail">rotation · TTL 15m</text>

  <text x="34" y="154" class="lane">메일</text>
  <rect x="34" y="164" width="178" height="66" rx="11" class="resource"/>
  <text x="123" y="192" class="name">token row</text>
  <text x="123" y="218" class="detail">transaction commit</text>
  <path d="M212 197h42" class="flow"/>
  <rect x="258" y="164" width="178" height="66" rx="11" class="integration"/>
  <text x="347" y="192" class="name">동기 send</text>
  <text x="347" y="218" class="detail">request thread</text>
  <path d="M436 197h42" class="flow"/>
  <rect x="482" y="164" width="204" height="66" rx="11" class="integration"/>
  <text x="584" y="192" class="name">SMTP 결과</text>
  <text x="584" y="218" class="detail">200 / 424</text>

  <text x="34" y="268" class="lane">확정</text>
  <rect x="34" y="278" width="178" height="54" rx="11" class="outside"/>
  <text x="123" y="312" class="name">confirm raw</text>
  <path d="M212 305h42" class="flow"/>
  <rect x="258" y="278" width="178" height="54" rx="11" class="application"/>
  <text x="347" y="302" class="name">hash + lock</text>
  <text x="347" y="326" class="detail">expiry · usedAt</text>
  <path d="M436 305h42" class="flow"/>
  <rect x="482" y="278" width="204" height="54" rx="11" class="resource"/>
  <text x="584" y="302" class="name">BCrypt + usedAt</text>
  <text x="584" y="326" class="detail">same tx · 204</text>
</svg>
