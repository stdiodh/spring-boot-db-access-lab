spring:
  application:
    name: spring-boot-db-access-lab
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/aandi_lab?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger
    operations-sorter: method
  default-produces-media-type: application/json
