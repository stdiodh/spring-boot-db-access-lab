services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: aandi_lab
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "127.0.0.1:3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - --protocol=tcp
        - -h
        - 127.0.0.1
        - --silent
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

volumes:
  mysql-data:
