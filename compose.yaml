services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: aandi_lab
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
